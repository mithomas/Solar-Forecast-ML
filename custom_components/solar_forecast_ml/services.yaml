send_daily_briefing:
  name: Send Daily Solar Briefing
  description: "Developer only or on advice."
  fields:
    forecast_entity:
      name: "Forecast Entity"
      description: "Optional. Select any entity from the target Solar Forecast ML forecast."
      required: false
      selector:
        entity:
          domain:
            - sensor
            - switch
    entry_title:
      name: "Entry Title"
      description: "Optional. Target by the existing Home Assistant config entry title."
      required: false
      selector:
        text:
    entry_id:
      name: "Config Entry ID"
      description: "Optional. Target by the Home Assistant config entry ID."
      required: false
      selector:
        text:
    notify_service:
      name: Mobile Device (Optional)
      description: "Developer only or on advice."
      example: "mobile_app_iphone"
      default: "persistent_notification"
      required: false
      selector:
        text:
    language:
      name: Language
      description: Language for the notification text (de=German, en=English)
      example: "de"
      default: "de"
      required: false
      selector:
        select:
          options:
            - label: "Deutsch"
              value: "de"
            - label: "English"
              value: "en"

